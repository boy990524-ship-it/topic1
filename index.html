<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FocusStats - 專注力與學習統計</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-3">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">FocusStats</span>
        <div class="text-end text-muted">專注力與學習統計</div>
      </div>
    </nav>

    <main class="container pb-4">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4 page-header">
        <div>
          <h1 class="mb-1">FocusStats</h1>
          <p class="text-muted mb-0">將計時與紀錄分頁管理，更專注、更好閱讀。</p>
        </div>
        <div class="btn-group page-tabs" role="group" aria-label="page tabs">
          <button id="tabTimer" class="btn btn-primary">計時</button>
          <button id="tabRecords" class="btn btn-outline-primary">紀錄</button>
        </div>
      </div>

      <section id="timerPage" class="page-section">
        <div class="card p-4 shadow-sm mb-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h5 class="mb-1">番茄鐘</h5>
              <p class="text-muted small mb-0">專注與休息分段管理，讓你更有效率。</p>
            </div>
            <span class="badge rounded-pill bg-secondary">快速模式</span>
          </div>

          <div class="clock-display text-center py-4">
            <div id="modeLabel" class="badge bg-primary mb-3">工作計時</div>
            <div id="timeDisplay" class="time display-2 fw-bold">25:00</div>
          </div>

          <div class="d-flex gap-2 mb-4 flex-column flex-sm-row">
            <button id="startPauseBtn" class="btn btn-lg btn-primary flex-fill">開始</button>
            <button id="resetBtn" class="btn btn-lg btn-outline-secondary flex-fill">重置</button>
          </div>

          <div class="row gx-3 gy-3">
            <div class="col-sm-6">
              <label class="form-label">模式</label>
              <select id="modeSelect" class="form-select">
                <option value="work">工作計時</option>
                <option value="break">休息計時</option>
              </select>
            </div>
            <div class="col-sm-3">
              <label class="form-label">工作（分鐘）</label>
              <input id="workMinutes" type="number" min="1" class="form-control" value="25">
            </div>
            <div class="col-sm-3">
              <label class="form-label">休息（分鐘）</label>
              <input id="breakMinutes" type="number" min="1" class="form-control" value="5">
            </div>
          </div>

          <div class="mt-4 text-end">
            <button id="openAIBtn" class="btn btn-outline-primary">方向指引</button>
          </div>
        </div>

        <div class="card p-4 shadow-sm">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h5 class="mb-1">任務規劃</h5>
              <p class="text-muted small mb-0">建立今天重點任務，完成一項就勾選它。</p>
            </div>
            <button id="clearCompletedBtn" class="btn btn-sm btn-outline-danger">清除已完成</button>
          </div>
          <div class="mb-3 d-flex align-items-center justify-content-between gap-3">
            <div class="flex-fill">
              <div id="taskSummary" class="fw-semibold text-primary mb-2">今日任務 0 件，完成 0 件</div>
              <div class="progress" style="height: 10px; border-radius: 999px;">
                <div id="taskProgressBar" class="progress-bar bg-primary" role="progressbar" style="width: 0%; border-radius: 999px;"></div>
              </div>
            </div>
            <div id="taskGauge" class="d-flex align-items-center ms-3" style="width:86px;">
              <svg width="64" height="64" viewBox="0 0 64 64">
                <circle cx="32" cy="32" r="28" stroke="#e9f2ff" stroke-width="6" fill="none"></circle>
                <circle id="taskGaugeFill" cx="32" cy="32" r="28" stroke="#0d6efd" stroke-width="6" fill="none" stroke-linecap="round" transform="rotate(-90 32 32)" stroke-dasharray="175.84" stroke-dashoffset="175.84"></circle>
                <text id="taskGaugeText" x="32" y="36" text-anchor="middle" font-size="12" fill="#0d6efd" font-weight="700">0%</text>
              </svg>
            </div>
          </div>
          <div class="input-group mb-3">
            <input id="taskInput" type="text" class="form-control" placeholder="輸入新的任務內容" />
            <input id="taskCategory" type="text" class="form-control" placeholder="分類 (選填)" style="max-width:160px;" />
            <button id="addTaskBtn" class="btn btn-primary">新增任務</button>
          </div>
          <div id="taskList" class="list-group"></div>
        </div>
      </section>

      <section id="recordsPage" class="page-section d-none">
        <div class="card p-4 shadow-sm mb-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h5 class="mb-1">閱讀與專注統計</h5>
              <p class="text-muted small mb-0">查看過去紀錄，了解你的專注趨勢。</p>
            </div>
            <div class="d-flex align-items-center gap-2">
              <div class="btn-group" role="group" aria-label="view toggles">
              <button id="viewDay" class="btn btn-outline-primary active">本日</button>
              <button id="viewMonth" class="btn btn-outline-primary">本月</button>
              <button id="viewYear" class="btn btn-outline-primary">年度</button>
              </div>
              <div class="d-flex gap-2 align-items-center ms-3">
                <select id="recordFilter" class="form-select form-select-sm">
                  <option value="all">全部</option>
                  <option value="7">最近 7 天</option>
                  <option value="30">最近 30 天</option>
                  <option value="90">最近 90 天</option>
                  <option value="custom">自訂區間</option>
                </select>
                <input id="filterStart" type="date" class="form-control form-control-sm" style="display:none; width:150px;" />
                <input id="filterEnd" type="date" class="form-control form-control-sm" style="display:none; width:150px;" />
                <button id="applyFilterBtn" class="btn btn-sm btn-primary">篩選</button>
              </div>
            </div>
          </div>
          <div class="chart-card">
            <canvas id="statsChart" height="140"></canvas>
          </div>
          <div class="mt-3 small text-muted">所有資料儲存在瀏覽器 localStorage。</div>
        </div>

        <div class="card p-4 shadow-sm">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h5 class="mb-1">最近紀錄</h5>
              <p class="text-muted small mb-0">依時間排序顯示最近的專注紀錄。</p>
            </div>
          </div>
          <div class="d-flex justify-content-end mb-2 gap-2">
            <button id="exportCsvBtn" class="btn btn-sm btn-outline-secondary">匯出 CSV</button>
            <button id="clearRecordsBtn" class="btn btn-sm btn-outline-danger">清除紀錄</button>
          </div>
          <div id="recordList" class="list-group"></div>
        </div>
      </section>
    </main>

    <!-- Record Confirmation Modal -->
    <div class="modal" tabindex="-1" id="recordConfirmModal">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">計時重置</h5>
            <button type="button" class="btn-close" id="closeRecordConfirm"></button>
          </div>
          <div class="modal-body">
            <p>要記錄這次的計時嗎？</p>
            <div id="recordConfirmDuration" class="text-muted small mb-3"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="skipRecordBtn">否</button>
            <button type="button" class="btn btn-primary" id="confirmRecordBtn">是</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Direction Guidance Modal -->
    <div class="modal" tabindex="-1" id="aiModal">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">專注方向指引</h5>
            <button type="button" class="btn-close" id="closeAIModal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">描述你的學習或專注困境</label>
              <textarea id="aiPrompt" class="form-control" rows="4" placeholder="例如：我想更專注讀書、或需要規劃今天的學習優先順序。"></textarea>
            </div>
            <div class="mb-3 text-muted small">我們會根據你的情境提供具體方向建議，不會進行實際 AI 查詢。</div>
            <div class="d-flex justify-content-end align-items-center gap-2">
              <div id="aiSpinner" style="display:none; width:18px; height:18px;" class="spinner-border spinner-border-sm text-primary" role="status"></div>
              <button id="sendAI" class="btn btn-primary">取得指引</button>
            </div>
            <hr class="my-4">
            <div>
              <label class="form-label">方向建議</label>
              <div id="aiResponse" class="border rounded p-3" style="min-height:140px; background:#f8fbff;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
