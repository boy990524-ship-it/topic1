<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FocusStats - 專注力與學習統計</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-3">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">FocusStats</span>
        <div class="text-end text-muted">專注力與學習統計</div>
      </div>
    </nav>

    <main class="container">
      <div class="row g-4">
        <section class="col-lg-4">
          <div class="card p-3">
            <h5>番茄鐘</h5>
            <div class="clock-display text-center my-3">
              <div id="modeLabel" class="badge bg-primary">工作計時</div>
              <div id="timeDisplay" class="time fs-1">25:00</div>
            </div>

            <div class="d-flex gap-2 mb-3">
              <button id="startPauseBtn" class="btn btn-success flex-fill">開始</button>
              <button id="resetBtn" class="btn btn-secondary">重置</button>
            </div>

            <div class="mb-2">
              <label class="form-label">模式</label>
              <select id="modeSelect" class="form-select">
                <option value="work">工作計時</option>
                <option value="break">休息計時</option>
              </select>
            </div>

            <div class="row gy-2">
              <div class="col-6">
                <label class="form-label">工作（分鐘）</label>
                <input id="workMinutes" type="number" min="1" class="form-control" value="25">
              </div>
              <div class="col-6">
                <label class="form-label">休息（分鐘）</label>
                <input id="breakMinutes" type="number" min="1" class="form-control" value="5">
              </div>
            </div>

            <hr>
            <div>
              <button id="openAIBtn" class="btn btn-outline-primary w-100">AI 查詢小助手</button>
            </div>
          </div>
        </section>

        <section class="col-lg-8">
          <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="mb-0">閱讀與專注統計</h5>
              <div>
                <div class="btn-group" role="group" aria-label="view toggles">
                  <button id="viewDay" class="btn btn-outline-primary active">本日</button>
                  <button id="viewMonth" class="btn btn-outline-primary">本月</button>
                  <button id="viewYear" class="btn btn-outline-primary">年度</button>
                </div>
              </div>
            </div>
            <canvas id="statsChart" height="120"></canvas>
            <div class="mt-3 small text-muted">所有資料儲存在瀏覽器 localStorage。</div>
          </div>
        </section>
      </div>
    </main>

    <!-- AI Assistant Modal -->
    <div class="modal" tabindex="-1" id="aiModal">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">AI 查詢小助手</h5>
            <button type="button" class="btn-close" id="closeAIModal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-2">
              <label class="form-label">API Key（可使用 OpenAI Key）</label>
              <input id="apiKeyInput" class="form-control" placeholder="輸入 OpenAI API Key（直接呼叫）">
            </div>
            <div class="mb-2">
              <label class="form-label">Proxy Secret（如後端啟用請填入）</label>
              <input id="proxySecretInput" class="form-control" placeholder="輸入後端代理密鑰（可選）">
            </div>
            <div class="mb-2">
              <label class="form-label">請輸入問題</label>
              <textarea id="aiPrompt" class="form-control" rows="4"></textarea>
            </div>
            <div class="text-end">
              <button id="sendAI" class="btn btn-primary">送出</button>
            </div>
            <hr>
            <div>
              <label class="form-label">AI 回覆</label>
              <div id="aiResponse" class="border rounded p-2" style="min-height:120px; background:#fafafa;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
